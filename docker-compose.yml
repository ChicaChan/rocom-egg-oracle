services:
  rocom-egg-predictor:
    build:
      context: .
      dockerfile: Dockerfile
    image: rocom-egg-predictor:latest
    container_name: rocom-egg-predictor
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_OPTIONS: --max-old-space-size=256
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
